name: Tests

on:
  pull_request:
    paths:
      - 'tsconfig.base.json'
      - 'package.json'
      - '.yarnrc.yml'
      - 'yarn.lock'
      - 'apps/**'
      - '.github/workflows/tests.yml'
  push:
    branches:
      - main
    paths:
      - 'tsconfig.base.json'
      - 'package.json'
      - '.yarnrc.yml'
      - 'yarn.lock'
      - 'apps/**'
      - '.github/workflows/tests.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Restore Yarn cache
        uses: actions/cache@v5.0.5
        with:
          path: |
            /home/runner/.yarn/berry/cache
            .yarn/install-state.gz
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run backend typechecking
        run: yarn backend:typecheck

      - name: Run backend tests
        run: yarn backend:test

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Restore Yarn cache
        uses: actions/cache@v5.0.5
        with:
          path: |
            /home/runner/.yarn/berry/cache
            .yarn/install-state.gz
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run frontend typechecking
        run: yarn frontend:typecheck

      - name: Run frontend tests
        run: yarn frontend:test
